<html>

<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Touhou Project Original Cover</title>
	<link rel="shortcut icon" href="favicon.ico">
	<meta name="author" content="TBSGroup" />
	<link href='https://fonts.googleapis.com/css?family=PT+Sans+Narrow' rel='stylesheet' type='text/css' />
	<link href="css/style.css" rel="stylesheet" type="text/css" />
	<!-- 加载画廊数据 -->
	<script src="js/gallery.js"></script>
	<!-- 加载Vue -->
	<script src="https://fastly.jsdelivr.net/npm/vue@2"></script>
</head>

<body>
	<div id="app">
		<div id="header">
			<a href="https://thwiki.cc/">
				<span>&laquo; Back to THBWiki</span>
			</a>
			<span class="right_ab">
				<a href="http://www16.big.or.jp/~zun/" target="_blank">original by Shanghai Alice</a>
				<a href="https://thwiki.cc/"><strong>Site By TBSGroup</strong></a>
			</span>
		</div>
		<h1>Touhou Project</h1>
		<div id="portfolio">
			<div id="background"></div>
			<div class="arrows">
				<a @click="handleUp" class="up" v-show="currentYIndex > 0">Up</a>
				<a @click="handleDown" class="down" v-show="currentYIndex < currentMaxYIndex">Down</a>
				<a @click="handleLeft" class="prev" v-show="currentXIndex > 0">Previous</a>
				<a @click="handleRight" class="next" v-show="currentXIndex < currentMaxXIndex">Next</a>
			</div>
			<div class="gallery">
				<div class="inside" ref="inside">
					<div class="item" v-for="(group, xIndex) in images" :key="xIndex" :ref="'item' + xIndex">
						<div v-for="(image, yIndex) in group" :key="yIndex" :ref="'img' + xIndex + '_' + yIndex">
							<div class="title">{{image.alt}}</div>
							<img :src="image.src" />
						</div>
					</div>
				</div>
			</div>
			<div class="paths">
				<div v-for="(group, xIndex) in images" :key="xIndex" :class="'path' + xIndex" :ref="'path' + xIndex"
					:style="{
                    'width': pathOp.width + 'px', 'left': pathLeft * xIndex + 'px' }">
					<a v-for="(image, yIndex) in group" :key="yIndex" @click="handleGo(xIndex, yIndex)"
						:class="[{'active': currentXIndex === xIndex && currentYIndex === yIndex}]"
						:ref="'pathItem' + xIndex + '_' + yIndex"
						:style="{'width': pathOp.width + 'px', 'height': pathOp.height + 'px', 'top': (pathTop) * yIndex + 'px'}"
						:title="image.alt"></a>
				</div>
			</div>
		</div>
	</div>
	<script>
		new Vue({
			el: '#app',
			data() {
				return {
					// 当前指引器横向索引
					currentXIndex: 0,
					// 当前指引器纵向索引
					currentYIndex: 0,

					// 是否为点击路径指示器触发的索引变化
					isGo: false,

					// 图片和路径指示器的尺寸和间距配置
					imageOp: {
						width: 600,
						height: 400,
						margin: 20
					},
					pathOp: {
						width: 10,
						height: 10,
						marginTop: 5,
						marginLeft: 5
					},
				}
			},
			computed: {
				images() {
					// 直接返回全局的galleryData
					return window.galleryImages;
				},
				currentMaxXIndex() {
					// 横向索引的最大值取决于图片数组的长度
					return this.images.length - 1;
				},
				currentMaxYIndex() {
					if (this.images.length === 0) {
						return 0;
					}
					// 纵向索引的最大值取决于当前横向索引对应的图片组的长度
					return this.images[this.currentXIndex].length - 1;
				},
				imageLeft() {
					// 计算图片的left值
					return this.imageOp.width + this.imageOp.margin;
				},
				imageTop() {
					// 计算图片的top值
					return this.imageOp.height + this.imageOp.margin;
				},
				pathLeft() {
					// 计算路径指示器的left值
					return this.pathOp.width + this.pathOp.marginLeft;
				},
				pathTop() {
					// 计算路径指示器的top值
					return this.pathOp.height + this.pathOp.marginTop;
				}
			},
			watch: {
				currentXIndex(newX) {
					// 当横向索引变化时，重置纵向索引为0
					if (!this.isGo) {
						this.currentYIndex = 0;
					}

					// 计算新的left和top值，并更新inside的样式
					this.onChangePos(newX, this.currentYIndex);
				},
				currentYIndex(newY) {
					// 计算新的left和top值，并更新inside的样式
					this.onChangePos(this.currentXIndex, newY);
				}
			},
			methods: {
				initGallery() {
					// 重置横纵向索引
					this.currentXIndex = 0;
					this.currentYIndex = 0;

					// 计算图片数组有几组
					var xlen = this.images.length;

					// 计算每组图片的位置
					for (var i = 0; i < xlen; i++) {
						var refItem = this.$refs['item' + i];
						if (!refItem) {
							continue;
						}
						var t = refItem[0];
						t.style.left = i * this.imageLeft + 'px';
						var ylen = this.images[i].length;
						for (var j = 0; j < ylen; j++) {
							var img = this.$refs['img' + i + '_' + j][0];
							img.style.top = j * this.imageTop + 'px';
						}
					}
				},
				handleUp() {
					// 当纵向索引大于0时，纵向索引减一
					if (this.currentYIndex > 0) {
						this.currentYIndex--;
					}
				},
				handleDown() {
					// 当纵向索引小于最大值时，纵向索引加一
					if (this.currentYIndex < this.currentMaxYIndex) {
						this.currentYIndex++;
					}
				},
				handleLeft() {
					// 当横向索引大于0时，横向索引减一
					if (this.currentXIndex > 0) {
						this.currentXIndex--;
					}
				},
				handleRight() {
					// 当横向索引小于最大值时，横向索引加一
					if (this.currentXIndex < this.currentMaxXIndex) {
						this.currentXIndex++;
					}
				},
				handleGo(x, y) {
					// 横向索引和纵向索引都设置为x和y
					this.isGo = true;
					this.currentXIndex = x;
					this.currentYIndex = y;
				},
				onChangePos(x, y) {
					// 计算新的left和top值，并更新inside的样式
					var left = x * this.imageLeft;
					var top = y * this.imageTop;
					var inside = this.$refs.inside;
					inside.style.left = -left + 'px';
					inside.style.top = -top + 'px';
					this.isGo = false;
				}
			},
			mounted() {
				// 初始化画廊
				this.initGallery();
			}
		})
	</script>
</body>

</html>
